<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết tin tuyển dụng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <a th:href="@{/jobs/manage}" class="btn btn-secondary mb-3">
        Quay lại danh sách
    </a>

    <div class="card">
        <div class="card-header">
            <h3 th:text="${job.title}">Tiêu đề công việc</h3>

            <span class="badge"
                  th:classappend="${job.status.name() == 'DRAFT'} ? ' bg-secondary' :
                                  (${job.status.name() == 'ACTIVE'} ? ' bg-success' : ' bg-danger')"
                  th:text="${job.status}">
            </span>
        </div>

        <div class="card-body">

            <p>
                <strong>Phòng ban:</strong>
                <span th:text="${job.department}"></span>
            </p>

            <p>
                <strong>Địa điểm:</strong>
                <span th:text="${job.location}"></span>
            </p>

            <p>
                <strong>Mức lương:</strong>
                <span th:text="${job.salaryRange != null && !#strings.isEmpty(job.salaryRange) ? job.salaryRange : 'Chưa cập nhật'}"></span>
            </p>

            <p>
                <strong>Hạn nộp hồ sơ:</strong>
                <span th:text="${job.applicationDeadline != null ? job.applicationDeadline : 'Chưa có'}"></span>
            </p>

            <hr>

            <h5>Mô tả công việc</h5>
            <p th:text="${job.description}"></p>

            <h5>Yêu cầu công việc</h5>
            <p th:text="${job.requirements != null && !#strings.isEmpty(job.requirements) ? job.requirements : 'Không có'}"></p>

            <hr>

            <div class="d-flex gap-2 flex-wrap">

                <a th:if="${job.status.name() == 'DRAFT' || job.status.name() == 'ACTIVE'}"
                   th:href="@{/jobs/manage/{id}/edit(id=${job.id})}"
                   class="btn btn-warning">
                    Sửa
                </a>

                <form th:if="${job.status.name() == 'DRAFT'}"
                      th:action="@{/jobs/manage/{id}/publish(id=${job.id})}"
                      method="post">
                    <button type="submit"
                            class="btn btn-primary"
                            onclick="return confirm('Bạn có chắc muốn đăng tin này không?')">
                        Đăng tin
                    </button>
                </form>

                <form th:if="${job.status.name() == 'ACTIVE'}"
                      th:action="@{/jobs/manage/{id}/close(id=${job.id})}"
                      method="post">
                    <button type="submit"
                            class="btn btn-secondary"
                            onclick="return confirm('Bạn có chắc muốn đóng tin này không?')">
                        Đóng tin
                    </button>
                </form>

                <form th:if="${job.status.name() == 'DRAFT'}"
                      th:action="@{/jobs/manage/{id}/delete(id=${job.id})}"
                      method="post">
                    <button type="submit"
                            class="btn btn-danger"
                            onclick="return confirm('Bạn có chắc muốn xóa tin này không?')">
                        Xóa
                    </button>
                </form>

            </div>

        </div>
    </div>

</div>

</body>
</html>

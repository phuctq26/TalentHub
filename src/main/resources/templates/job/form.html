<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/app-layout :: layout(~{::main-content}, th:text='${isEdit} ? \'Edit Job Posting\' : \'Create Job Posting\'', 'job-postings')}">
<body>
<main th:fragment="main-content">

    <!-- Back Button -->
    <div class="mb-4">
        <a th:href="@{/jobs/manage}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left me-1"></i> Quay lại danh sách
        </a>
    </div>

    <!-- Header Title -->
    <div class="mb-4">
        <h2 class="fw-bold text-dark mb-1" th:text="${isEdit} ? 'Chỉnh sửa tin tuyển dụng' : 'Tạo mới tin tuyển dụng'"></h2>
        <p class="text-muted mb-0">Cung cấp thông tin chi tiết về vị trí cần tuyển dụng (SCR-11)</p>
    </div>

    <!-- Closed Job Banner -->
    <div th:if="${isClosed}" class="alert alert-warning border-0 shadow-sm d-flex align-items-center mb-4" role="alert">
        <i class="bi bi-exclamation-triangle-fill fs-4 me-3"></i>
        <div>
            <h6 class="alert-heading fw-bold mb-1">Tin tuyển dụng đã đóng</h6>
            <span>Closed job postings cannot be edited. Không thể thực hiện chỉnh sửa hoặc lưu thông tin.</span>
        </div>
    </div>

    <!-- Form Card -->
    <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
            
            <form th:action="@{/jobs/manage/save}" method="post" th:object="${job}">
                <input type="hidden" th:field="*{id}">

                <div class="row g-3">
                    
                    <!-- Job Title -->
                    <div class="col-12">
                        <label class="form-label fw-semibold text-dark">Tiêu đề công việc <span class="text-danger" th:if="${!isClosed}">*</span></label>
                        <input type="text"
                               th:field="*{title}"
                               class="form-control"
                               th:classappend="${#fields.hasErrors('title')} ? 'is-invalid' : ''"
                               th:readonly="${isClosed}"
                               placeholder="Ví dụ: Senior Java Engineer...">
                        <div class="invalid-feedback" th:errors="*{title}"></div>
                    </div>

                    <!-- Department -->
                    <div class="col-md-6">
                        <label class="form-label fw-semibold text-dark">Phòng ban <span class="text-danger" th:if="${!isClosed}">*</span></label>
                        <input type="text"
                               th:field="*{department}"
                               class="form-control"
                               th:classappend="${#fields.hasErrors('department')} ? 'is-invalid' : ''"
                               th:readonly="${isClosed}"
                               placeholder="Ví dụ: R&D, Marketing...">
                        <div class="invalid-feedback" th:errors="*{department}"></div>
                    </div>

                    <!-- Location -->
                    <div class="col-md-6">
                        <label class="form-label fw-semibold text-dark">Địa điểm làm việc <span class="text-danger" th:if="${!isClosed}">*</span></label>
                        <input type="text"
                               th:field="*{location}"
                               class="form-control"
                               th:classappend="${#fields.hasErrors('location')} ? 'is-invalid' : ''"
                               th:readonly="${isClosed}"
                               placeholder="Ví dụ: Hà Nội, TP. Hồ Chí Minh...">
                        <div class="invalid-feedback" th:errors="*{location}"></div>
                    </div>

                    <!-- Salary Range -->
                    <div class="col-md-6">
                        <label class="form-label fw-semibold text-dark">Mức lương</label>
                        <input type="text"
                               th:field="*{salaryRange}"
                               class="form-control"
                               th:classappend="${#fields.hasErrors('salaryRange')} ? 'is-invalid' : ''"
                               th:readonly="${isClosed}"
                               placeholder="Ví dụ: 15–20M VND">
                        <div class="invalid-feedback" th:errors="*{salaryRange}"></div>
                    </div>

                    <!-- Application Deadline -->
                    <div class="col-md-6">
                        <label class="form-label fw-semibold text-dark">Hạn nộp hồ sơ</label>
                        <input type="date"
                               th:field="*{applicationDeadline}"
                               class="form-control"
                               th:classappend="${#fields.hasErrors('applicationDeadline')} ? 'is-invalid' : ''"
                               th:readonly="${isClosed}">
                        <div class="invalid-feedback" th:errors="*{applicationDeadline}"></div>
                    </div>

                    <!-- Job Description -->
                    <div class="col-12">
                        <label class="form-label fw-semibold text-dark">Mô tả công việc <span class="text-danger" th:if="${!isClosed}">*</span></label>
                        <textarea th:field="*{description}"
                                  class="form-control"
                                  th:classappend="${#fields.hasErrors('description')} ? 'is-invalid' : ''"
                                  rows="6"
                                  th:readonly="${isClosed}"
                                  placeholder="Nhập thông tin chi tiết về mô tả công việc..."></textarea>
                        <div class="invalid-feedback" th:errors="*{description}"></div>
                    </div>

                    <!-- Job Requirements -->
                    <div class="col-12">
                        <label class="form-label fw-semibold text-dark">Yêu cầu công việc</label>
                        <textarea th:field="*{requirements}"
                                  class="form-control"
                                  th:classappend="${#fields.hasErrors('requirements')} ? 'is-invalid' : ''"
                                  rows="5"
                                  th:readonly="${isClosed}"
                                  placeholder="Nhập các kỹ năng, kinh nghiệm cần thiết cho vị trí ứng tuyển..."></textarea>
                        <div class="invalid-feedback" th:errors="*{requirements}"></div>
                    </div>

                </div>

                <!-- Action Buttons Area -->
                <div class="d-flex gap-2 mt-4 pt-3 border-top border-light">
                    
                    <!-- Save Button (Editable mode) -->
                    <button th:if="${!isClosed}"
                            type="submit"
                            class="btn btn-primary px-4">
                        <i class="bi bi-save me-1"></i>
                        <span th:text="${jobStatus?.name() == 'ACTIVE'} ? 'Lưu thay đổi' : 'Lưu nháp'">Lưu nháp</span>
                    </button>

                    <!-- Save and Publish Button (Edit mode AND status is DRAFT) -->
                    <button th:if="${isEdit && jobStatus?.name() == 'DRAFT'}"
                            type="submit"
                            class="btn btn-success px-4"
                            th:formaction="@{/jobs/manage/publish-from-form}"
                            onclick="return confirm('Bạn có chắc muốn đăng tin tuyển dụng này công khai ngay bây giờ?')">
                        <i class="bi bi-send me-1"></i> Lưu và đăng tin
                    </button>

                    <!-- Cancel / Return Button -->
                    <a th:if="${isEdit}" th:href="@{/jobs/manage/{id}(id=*{id})}" class="btn btn-outline-secondary px-4">
                        Hủy
                    </a>
                    <a th:if="${!isEdit}" th:href="@{/jobs/manage}" class="btn btn-outline-secondary px-4">
                        Hủy
                    </a>

                </div>

            </form>

        </div>
    </div>

</main>
</body>
</html>

<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/app-layout :: layout(~{::main-content}, ${title}, ${activeTab})}">
<body>
<main th:fragment="main-content">

    <!-- Link the page-specific stylesheet -->
    <link rel="stylesheet" th:href="@{/css/hr/assign-interview.css}">

    <!-- Back Button -->
    <div class="mb-4">
        <a th:href="@{/hr/applications/{id}(id=${app.id})}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left me-1"></i> Quay lại chi tiết hồ sơ
        </a>
    </div>

    <div class="schedule-container">
        <!-- Error Alerts -->
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show mb-4" role="alert">
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <!-- Schedule Card -->
        <div class="schedule-card">
            
            <!-- Context Header: Candidate and Job Info -->
            <div class="context-header">
                <div class="context-title">Hồ sơ phỏng vấn</div>
                <h4 class="context-candidate" th:text="${app.candidate.fullName}">Candidate Name</h4>
                <div class="context-job">
                    Vị trí ứng tuyển: <strong th:text="${app.job.title}">Job Title</strong>
                </div>
            </div>

            <!-- Form -->
            <form th:action="@{/hr/applications/{id}/assign-interview(id=${app.id})}" method="post">
                
                <h5 class="form-section-title">Lên lịch & Phân công phỏng vấn</h5>

                <!-- Dropdown notice if no Interviewers exist -->
                <div th:if="${#lists.isEmpty(interviewers)}" class="notice-banner">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                    <span>Không có người phỏng vấn nào khả dụng. Hãy yêu cầu Admin tạo tài khoản Người phỏng vấn trước.</span>
                </div>

                <!-- Interviewer Dropdown -->
                <div class="mb-4">
                    <label for="interviewerId" class="form-label">Người phỏng vấn (Interviewer)</label>
                    <select id="interviewerId" name="interviewerId" class="form-select" th:disabled="${#lists.isEmpty(interviewers)}" required>
                        <option value="" disabled selected>-- Chọn người phỏng vấn --</option>
                        <option th:each="intv : ${interviewers}" 
                                th:value="${intv.id}" 
                                th:text="${intv.fullName} + ' (' + ${intv.email} + ')'"
                                th:selected="${param.interviewerId != null && param.interviewerId[0] == intv.id.toString()}">
                            Interviewer Name
                        </option>
                    </select>
                    <div th:if="${interviewerError}" class="input-feedback-error" th:text="${interviewerError}"></div>
                </div>

                <div class="row">
                    <!-- Date Picker -->
                    <div class="col-md-6 mb-4">
                        <label for="interviewDate" class="form-label">Ngày phỏng vấn</label>
                        <input type="date" id="interviewDate" name="interviewDate" class="form-control" 
                                th:value="${param.interviewDate}" required>
                        <div th:if="${dateError}" class="input-feedback-error" th:text="${dateError}"></div>
                    </div>

                    <!-- Time Field -->
                    <div class="col-md-6 mb-4">
                        <label for="interviewTime" class="form-label">Giờ phỏng vấn (HH:mm)</label>
                        <input type="text" id="interviewTime" name="interviewTime" class="form-control" 
                               placeholder="VD: 14:30" th:value="${param.interviewTime}" required>
                        <small class="form-text text-muted">Định dạng 24 giờ (HH:mm).</small>
                        <div th:if="${timeError}" class="input-feedback-error" th:text="${timeError}"></div>
                    </div>
                </div>

                <!-- Location or Meeting Link -->
                <div class="mb-4">
                    <label for="locationOrMeetingLink" class="form-label">Địa điểm hoặc Đường dẫn cuộc họp</label>
                    <input type="text" id="locationOrMeetingLink" name="locationOrMeetingLink" class="form-control" 
                           placeholder="VD: Phòng họp A, hoặc đường dẫn Zoom/Meet" maxlength="500" 
                           th:value="${locationOrMeetingLink}">
                    <small class="form-text text-muted">Tùy chọn. Tối đa 500 ký tự.</small>
                </div>

                <!-- Form Action Buttons -->
                <div class="form-buttons-group">
                    <a th:href="@{/hr/applications/{id}(id=${app.id})}" class="btn-schedule-secondary">
                        Hủy bỏ
                    </a>
                    <button type="submit" class="btn-schedule-primary" th:disabled="${#lists.isEmpty(interviewers)}">
                        Xác nhận & Lên lịch
                    </button>
                </div>

            </form>

        </div>
    </div>
</main>
</body>
</html>

<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/app-layout :: layout(~{::main-content}, 'Đổi mật khẩu', 'change-password')}">
<body>
<main th:fragment="main-content">
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div class="row justify-content-center">
        <div class="col-lg-6 col-xl-5">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-dark text-white text-center py-3">
                    <h4 class="mb-0 fw-bold" style="color: aliceblue;">Đổi mật khẩu</h4>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/change-password}" th:object="${changePasswordForm}" method="post">
                        <!-- Hidden: username is sent from session, not from user input -->
                        <input type="hidden" th:field="*{username}">


                        <!-- Current Username Display -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold text-secondary small">Tên đăng nhập</label>
                            <input type="text" class="form-control bg-light" th:value="${session.currentUser != null ? session.currentUser.username : ''}" readonly disabled>
                        </div>

                        <!-- Current Password -->
                        <div class="mb-3">
                            <label for="oldPassword" class="form-label fw-semibold">Mật khẩu hiện tại <span class="text-danger">*</span></label>
                            <input type="password" th:field="*{oldPassword}" id="oldPassword" class="form-control"
                                   th:classappend="${#fields.hasErrors('oldPassword')} ? 'is-invalid' : ''"
                                   placeholder="Nhập mật khẩu hiện tại">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('oldPassword')}" th:errors="*{oldPassword}"></div>
                        </div>

                        <!-- New Password -->
                        <div class="mb-3">
                            <label for="newPassword" class="form-label fw-semibold">Mật khẩu mới <span class="text-danger">*</span></label>
                            <input type="password" th:field="*{newPassword}" id="newPassword" class="form-control"
                                   th:classappend="${#fields.hasErrors('newPassword')} ? 'is-invalid' : ''"
                                   placeholder="Nhập mật khẩu mới">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></div>
                        </div>

                        <!-- Confirm New Password -->
                        <div class="mb-3">
                            <label for="confirmPassword" class="form-label fw-semibold">Xác nhận mật khẩu mới <span class="text-danger">*</span></label>
                            <input type="password" th:field="*{confirmPassword}" id="confirmPassword" class="form-control"
                                   th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid' : ''"
                                   placeholder="Xác nhận mật khẩu mới">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
                        </div>

                        <div class="d-flex gap-2 justify-content-end mt-4 pt-3 border-top">
                            <a th:href="@{/user/profile}" class="btn btn-secondary">Hủy</a>
                            <button type="submit" class="btn btn-primary px-4">Đổi mật khẩu</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>

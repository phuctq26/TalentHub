<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/app-layout :: layout(~{::main-content}, 'Chi tiết người dùng', 'users')}">
<body>
<main th:fragment="main-content">
    <div class="row justify-content-center">
        <div class="col-lg-8 col-xl-7">
            <!-- Details Card (Bootstrap 5) -->
            <div class="card shadow-sm border-0">
                <div class="card-header bg-dark text-white text-center py-3">
                    <h4 class="mb-0 fw-bold">CHI TIẾT NGƯỜI DÙNG</h4>
                </div>
                <div class="card-body p-4">
                    <div class="table-responsive">
                        <table class="table table-bordered table-striped align-middle">
                            <tbody>
                                <tr>
                                    <th class="table-light text-secondary" style="width: 35%;">ID</th>
                                    <td th:text="${user.id}" class="fw-semibold">1</td>
                                </tr>
                                <tr>
                                    <th class="table-light text-secondary">Họ và tên</th>
                                    <td th:text="${user.fullName}" class="fw-bold text-dark">Nguyễn Văn A</td>
                                </tr>
                                <tr>
                                    <th class="table-light text-secondary">Tên đăng nhập</th>
                                    <td th:text="${user.username}" class="font-monospace">nguyenvana</td>
                                </tr>
                                <tr>
                                    <th class="table-light text-secondary">Email</th>
                                    <td th:text="${user.email}">a@example.com</td>
                                </tr>
                                <tr>
                                    <th class="table-light text-secondary">Số điện thoại</th>
                                    <td th:text="${user.phone != null && user.phone != '' ? user.phone : 'Chưa cập nhật'}">-</td>
                                </tr>
                                <tr>
                                    <th class="table-light text-secondary">Vai trò</th>
                                    <td>
                                        <span class="badge bg-info text-dark" th:text="${user.role != null ? user.role.name : 'Chưa gán'}">ADMIN</span>
                                    </td>
                                </tr>
                                <tr>
                                    <th class="table-light text-secondary">Trạng thái</th>
                                    <td>
                                        <span class="badge"
                                              th:classappend="${user.status.name() == 'ACTIVE'} ? 'bg-success' : (${user.status.name() == 'LOCKED'} ? 'bg-warning text-dark' : 'bg-danger')"
                                              th:text="${user.status}">ACTIVE</span>
                                    </td>
                                </tr>
                                <tr>
                                    <th class="table-light text-secondary">Ngày tạo</th>
                                    <td th:text="${user.createdAt}">-</td>
                                </tr>
                                <tr>
                                    <th class="table-light text-secondary">Lần cập nhật cuối</th>
                                    <td th:text="${user.updatedAt}">-</td>
                                </tr>
                                <tr>
                                    <th class="table-light text-secondary">Số lần đăng nhập lỗi</th>
                                    <td th:text="${user.failedLoginAttempts}">0</td>
                                </tr>
                                <tr>
                                    <th class="table-light text-secondary">Khóa đến khi</th>
                                    <td th:text="${user.lockedUntil != null ? user.lockedUntil : 'Không bị khóa'}">-</td>
                                </tr>
                                <tr>
                                    <th class="table-light text-secondary">Đăng nhập lần cuối lúc</th>
                                    <td th:text="${user.lastLoginAt != null ? user.lastLoginAt : 'Chưa bao giờ đăng nhập'}">-</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- Actions Row -->
                    <div class="d-flex gap-2 justify-content-end mt-4 pt-3 border-top">
                        <a th:href="@{/admin/users}" class="btn btn-secondary">Quay lại danh sách</a>
                        <a th:href="@{/admin/users/{id}/edit(id=${user.id})}" class="btn btn-warning">Chỉnh sửa</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>

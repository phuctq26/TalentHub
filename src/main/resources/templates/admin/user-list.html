<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý người dùng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <!-- Flash message -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Quản lý người dùng</h2>
        <a th:href="@{/admin/users/new}" class="btn btn-primary">Tạo người dùng mới</a>
    </div>

    <!-- Search/Filter form -->
    <form th:action="@{/admin/users}" method="get" class="row g-2 mb-4">
        <div class="col-md-4">
            <input type="text"
                   name="keyword"
                   class="form-control"
                   placeholder="Tìm theo tên, username, email, sđt..."
                   th:value="${keyword}">
        </div>

        <div class="col-md-3">
            <select name="roleId" class="form-select">
                <option value="">Tất cả vai trò</option>
                <option th:each="r : ${roles}"
                        th:value="${r.id}"
                        th:text="${r.name}"
                        th:selected="${r.id == roleId}">
                </option>
            </select>
        </div>

        <div class="col-md-3">
            <select name="status" class="form-select">
                <option value="">Tất cả trạng thái</option>
                <option th:each="s : ${statuses}"
                        th:value="${s}"
                        th:text="${s}"
                        th:selected="${s == status}">
                </option>
            </select>
        </div>

        <div class="col-md-2 d-flex gap-2">
            <button type="submit" class="btn btn-success w-100">Lọc</button>
            <a th:href="@{/admin/users}" class="btn btn-secondary w-100">Làm mới</a>
        </div>
    </form>

    <div th:if="${#lists.isEmpty(users)}" class="alert alert-warning">
        Không tìm thấy người dùng nào phù hợp.
    </div>

    <!-- User Table -->
    <div class="table-responsive" th:if="${!#lists.isEmpty(users)}">
        <table class="table table-striped table-hover align-middle">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Họ và tên</th>
                    <th>Tên đăng nhập</th>
                    <th>Email</th>
                    <th>Số điện thoại</th>
                    <th>Vai trò</th>
                    <th>Trạng thái</th>
                    <th>Hành động</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="user : ${users}">
                    <td th:text="${user.id}">1</td>
                    <td>
                        <a th:href="@{/admin/users/{id}(id=${user.id})}" th:text="${user.fullName}" class="fw-bold text-decoration-none">Nguyễn Văn A</a>
                    </td>
                    <td th:text="${user.username}">nguyenvana</td>
                    <td th:text="${user.email}">a@example.com</td>
                    <td th:text="${user.phone != null && user.phone != '' ? user.phone : '-'}">-</td>
                    <td>
                        <span class="badge bg-info text-dark" th:text="${user.role != null ? user.role.name : 'Chưa gán'}">ADMIN</span>
                    </td>
                    <td>
                        <span class="badge"
                              th:classappend="${user.status.name() == 'ACTIVE'} ? 'bg-success' : (${user.status.name() == 'LOCKED'} ? 'bg-warning text-dark' : 'bg-danger')"
                              th:text="${user.status}">ACTIVE</span>
                    </td>
                    <td>
                        <div class="d-flex gap-2">
                            <a th:href="@{/admin/users/{id}/edit(id=${user.id})}" class="btn btn-sm btn-warning">Sửa</a>
                            
                            <!-- Activate/Deactivate -->
                            <form th:if="${user.status.name() != 'ACTIVE'}" th:action="@{/admin/users/{id}/activate(id=${user.id})}" method="post" style="display:inline;">
                                <button type="submit" class="btn btn-sm btn-success">Kích hoạt</button>
                            </form>
                            <form th:if="${user.status.name() == 'ACTIVE'}" th:action="@{/admin/users/{id}/deactivate(id=${user.id})}" method="post" style="display:inline;"
                                  onsubmit="return confirm('Bạn có chắc muốn vô hiệu hóa tài khoản này không?')">
                                <button type="submit" class="btn btn-sm btn-secondary">Vô hiệu hóa</button>
                            </form>
                            
                            <form th:action="@{/admin/users/{id}/delete(id=${user.id})}" method="post"
                                  onsubmit="return confirm('Bạn có chắc muốn xóa người dùng này không? Hành động này không thể hoàn tác.')" style="display:inline;">
                                <button type="submit" class="btn btn-sm btn-danger">Xóa</button>
                            </form>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

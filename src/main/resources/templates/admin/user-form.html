<html lang="vi" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout/app-layout :: layout(~{::main-content}, ${isEdit} ? 'Sửa thông tin người dùng' : 'Tạo người dùng mới', 'users')}">

<body>
    <main th:fragment="main-content">
        <div class="row justify-content-center">
            <div class="col-lg-8 col-xl-7">
                <!-- Form Card (Bootstrap 5) -->
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-dark text-white text-center py-3">
                        <h4 style="color: aliceblue;" class="mb-0 fw-bold"
                            th:text="${isEdit} ? 'SỬA THÔNG TIN NGƯỜI DÙNG' : 'TẠO NGƯỜI DÙNG MỚI'">TẠO NGƯỜI DÙNG MỚI
                        </h4>
                    </div>
                    <div class="card-body p-4">
                        <form th:action="@{/admin/users/save}" th:object="${userForm}" method="post"
                            class="needs-validation">
                            <input type="hidden" th:field="*{id}">
                            <input type="hidden" th:field="*{phone}">
                            <input type="hidden" th:field="*{status}">

                            <!-- Full Name -->
                            <div class="mb-3">
                                <label for="fullName" class="form-label fw-semibold">Full name <span
                                        class="text-danger">*</span></label>
                                <input type="text" th:field="*{fullName}" id="fullName" class="form-control"
                                    th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid' : ''"
                                    placeholder="Nhập họ và tên đầy đủ">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('fullName')}"
                                    th:errors="*{fullName}"></div>
                            </div>

                            <!-- Username -->
                            <div class="mb-3">
                                <label for="username" class="form-label fw-semibold">Username <span
                                        class="text-danger">*</span></label>
                                <input type="text" th:field="*{username}" id="username" class="form-control"
                                    th:classappend="${#fields.hasErrors('username')} ? 'is-invalid' : ''"
                                    placeholder="Nhập tên tài khoản" th:readonly="${isEdit}">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('username')}"
                                    th:errors="*{username}"></div>
                            </div>

                            <!-- Email -->
                            <div class="mb-3">
                                <label for="email" class="form-label fw-semibold">Email <span
                                        class="text-danger">*</span></label>
                                <input type="email" th:field="*{email}" id="email" class="form-control"
                                    th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''"
                                    placeholder="example@domain.com">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}"
                                    th:errors="*{email}"></div>
                            </div>

                            <!-- Role -->
                            <div class="mb-3">
                                <label for="role" class="form-label fw-semibold">Role <span class="text-danger">*</span></label>
                                <select th:field="*{roleId}" id="role" class="form-select"
                                        th:classappend="${#fields.hasErrors('roleId')} ? 'is-invalid' : ''">
                                    <option value="">Chọn vai trò</option>
                                    <option th:each="r : ${roles}" th:value="${r.id}" th:text="${r.name}"></option>
                                </select>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('roleId')}" th:errors="*{roleId}"></div>
                            </div>

                            <!-- Initial Password -->
                            <div class="mb-3">
                                <label for="password" class="form-label fw-semibold">
                                    Initial password
                                    <span class="text-danger" th:if="${!isEdit}">*</span>
                                    <small class="text-muted fw-normal" th:if="${isEdit}">(Để trống nếu không muốn
                                        đổi)</small>
                                </label>
                                <input type="password" th:field="*{password}" id="password" class="form-control"
                                    th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''"
                                    placeholder="Nhập mật khẩu truy cập">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}"
                                    th:errors="*{password}"></div>
                            </div>

                            <!-- Global errors -->
                            <div class="alert alert-danger shadow-sm border-0" th:if="${#fields.hasGlobalErrors()}">
                                <p class="mb-0 small" th:each="err : ${#fields.globalErrors()}" th:text="${err}"></p>
                            </div>

                            <!-- Actions Row -->
                            <div class="d-flex gap-2 justify-content-end mt-4 pt-3 border-top">
                                <a th:href="@{/admin/users}" class="btn btn-secondary">Quay lại</a>
                                <button type="submit" class="btn btn-success px-4"
                                    th:text="${isEdit} ? 'Cập nhật' : 'Thêm mới'">Lưu</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>

</html>

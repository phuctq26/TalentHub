<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${isEdit} ? 'Sửa thông tin người dùng' : 'Tạo người dùng mới'">Tạo người dùng mới</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4" style="max-width: 600px;">

    <div class="card shadow">
        <div class="card-header bg-dark text-white text-center">
            <h4 class="mb-0" th:text="${isEdit} ? 'SỬA THÔNG TIN NGƯỜI DÙNG' : 'TẠO NGƯỜI DÙNG MỚI'">TẠO NGƯỜI DÙNG MỚI</h4>
        </div>
        <div class="card-body">
            <form th:action="@{/admin/users/save}" th:object="${userForm}" method="post" class="needs-validation">
                <input type="hidden" th:field="*{id}">

                <!-- Full Name -->
                <div class="mb-3">
                    <label for="fullName" class="form-label">Họ và tên <span class="text-danger">*</span></label>
                    <input type="text" th:field="*{fullName}" id="fullName" class="form-control" th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid' : ''">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
                </div>

                <!-- Username -->
                <div class="mb-3">
                    <label for="username" class="form-label">Tên đăng nhập <span class="text-danger">*</span></label>
                    <input type="text" th:field="*{username}" id="username" class="form-control" th:classappend="${#fields.hasErrors('username')} ? 'is-invalid' : ''">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                </div>

                <!-- Email -->
                <div class="mb-3">
                    <label for="email" class="form-label">Email <span class="text-danger">*</span></label>
                    <input type="email" th:field="*{email}" id="email" class="form-control" th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                </div>

                <!-- Password -->
                <div class="mb-3">
                    <label for="password" class="form-label">
                        Mật khẩu
                        <span class="text-danger" th:if="${!isEdit}">*</span>
                        <small class="text-muted" th:if="${isEdit}">(Để trống nếu không muốn đổi)</small>
                    </label>
                    <input type="password" th:field="*{password}" id="password" class="form-control" th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                </div>

                <!-- Phone -->
                <div class="mb-3">
                    <label for="phone" class="form-label">Số điện thoại</label>
                    <input type="text" th:field="*{phone}" id="phone" class="form-control" th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid' : ''">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div>
                </div>

                <div class="row">
                    <!-- Role -->
                    <div class="col-md-6 mb-3">
                        <label for="role" class="form-label">Vai trò <span class="text-danger">*</span></label>
                        <select th:field="*{roleId}" id="role" class="form-select" th:classappend="${#fields.hasErrors('roleId')} ? 'is-invalid' : ''">
                            <option value="">Chọn vai trò</option>
                            <option th:each="r : ${roles}" th:value="${r.id}" th:text="${r.name}"></option>
                        </select>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('roleId')}" th:errors="*{roleId}"></div>
                    </div>

                    <!-- Status -->
                    <div class="col-md-6 mb-3">
                        <label for="status" class="form-label">Trạng thái <span class="text-danger">*</span></label>
                        <select th:field="*{status}" id="status" class="form-select" th:classappend="${#fields.hasErrors('status')} ? 'is-invalid' : ''">
                            <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"></option>
                        </select>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('status')}" th:errors="*{status}"></div>
                    </div>
                </div>

                <!-- Global errors -->
                <div class="alert alert-danger" th:if="${#fields.hasGlobalErrors()}">
                    <p th:each="err : ${#fields.globalErrors()}" th:text="${err}"></p>
                </div>

                <div class="d-flex gap-2 justify-content-end mt-4">
                    <a th:href="@{/admin/users}" class="btn btn-secondary">Quay lại</a>
                    <button type="submit" class="btn btn-success" th:text="${isEdit} ? 'Cập nhật' : 'Thêm mới'">Lưu</button>
                </div>
            </form>
        </div>
    </div>

</div>

</body>
</html>

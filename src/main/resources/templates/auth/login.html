<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập — TalentHub</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <main class="main-content">
        <div class="container">
            <div class="login-wrapper">

                <!-- Logo / Branding -->
                <div class="login-logo">
                    <a th:href="@{/}" class="logo">TalentHub</a>
                    <p class="subtitle">Đăng nhập vào tài khoản của bạn</p>
                </div>

                <!-- Login Card -->
                <div class="card">

                    <!-- Error Alerts -->
                    <div th:if="${lockoutError}" class="alert alert-danger" role="alert">
                        ⚠️ Tài khoản bị khóa tạm thời do đăng nhập sai quá nhiều lần. Vui lòng thử lại sau 10 phút.
                    </div>
                    <div th:if="${genericError}" class="alert alert-danger" role="alert">
                        ❌ Tên đăng nhập hoặc mật khẩu không đúng.
                    </div>

                    <form th:action="@{/login}" method="post">

                        <!-- Username / Email -->
                        <div class="form-group">
                            <label class="form-label" for="usernameOrEmail">Tên đăng nhập hoặc Email</label>
                            <input type="text"
                                   id="usernameOrEmail"
                                   name="usernameOrEmail"
                                   class="form-control"
                                   placeholder="Nhập tên đăng nhập hoặc email"
                                   required
                                   autocomplete="username">
                        </div>

                        <!-- Password -->
                        <div class="form-group">
                            <label class="form-label" for="password">Mật khẩu</label>
                            <div class="password-input-group">
                                <input type="password"
                                       id="password"
                                       name="password"
                                       class="form-control"
                                       placeholder="Nhập mật khẩu"
                                       required
                                       autocomplete="current-password">
                                <button type="button" class="toggle-password-btn" onclick="togglePassword()" title="Hiện/ẩn mật khẩu">👁</button>
                            </div>
                        </div>

                        <!-- Submit Button -->
                        <div class="form-group">
                            <button type="submit" class="btn btn-primary login-submit">
                                Đăng nhập
                            </button>
                        </div>

                    </form>

                    <!-- Footer Links -->
                    <div class="login-divider text-center">
                        <p>Chưa có tài khoản? <a th:href="@{/register}">Đăng ký ngay</a></p>
                        <p><a th:href="@{/forgot-password}">Quên mật khẩu?</a></p>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <script>
        function togglePassword() {
            const field = document.getElementById('password');
            field.type = field.type === 'password' ? 'text' : 'password';
        }
    </script>
</body>

</html>

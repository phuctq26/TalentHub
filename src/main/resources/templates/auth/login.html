<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>User Login — TalentHub</title>
</head>

<body>
    <div>
        <img th:src="@{/images/logo.png}" alt="TalentHub Logo">

        <h1>User Login to TalentHub</h1>

        <div th:if="${lockoutError}" role="alert">
            Your account has been temporarily locked after too many failed attempts.
            Try again in 10 minutes or contact your administrator.
        </div>

        <div th:if="${successMessage}" role="alert" style="color: green; padding: 10px; background-color: #d4edda; border: 1px solid #c3e6cb; border-radius: 4px; margin-bottom: 15px;">
            <span th:text="${successMessage}"></span>
        </div>

        <div th:if="${genericError}" role="alert">
            Incorrect username or password.
        </div>

        <form th:action="@{/login}" method="post">
            <div>
                <label for="usernameOrEmail">Username or email</label>
                <input type="text" id="usernameOrEmail" name="usernameOrEmail" required autocomplete="username">
            </div>

            <div>
                <label for="password">Password</label>
                <div>
                    <input type="password" id="password" name="password" required autocomplete="current-password">
                    <button type="button" onclick="togglePassword()">👁</button>
                </div>
            </div>

            <button type="submit">
                User Login
            </button>
        </form>

        <p>
            Don't have an account?
            <a th:href="@{/register}">Create an account</a>
        </p>

        <p>
            <a th:href="@{/forgot-password}">Forgot password?</a>
        </p>
    </div>

    <script>
        function togglePassword() {
            const field = document.getElementById('password');
            field.type = field.type === 'password' ? 'text' : 'password';
        }
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lại mật khẩu — TalentHub</title>
    <link rel="stylesheet" th:href="@{/css/auth/reset-password.css}">
</head>

<body class="forgot-password-body">

    <div class="forgot-card">

        <!-- Logo Area -->
        <div class="forgot-logo-area">
            <span class="logo">TalentHub</span>
        </div>

        <!-- Title & Subtitle -->
        <h2 class="forgot-title">Đặt lại mật khẩu</h2>
        <p class="forgot-desc">
            Nhập mật khẩu mới của bạn bên dưới. Mật khẩu phải chứa ít nhất 8 ký tự.
        </p>

        <!-- Error Alerts -->
        <div th:if="${errorMessage}" class="alert alert-danger" role="alert">
            <span th:text="${errorMessage}"></span>
        </div>

        <!-- Form -->
        <form th:action="@{/reset-password}" method="post">

            <!-- New Password -->
            <div class="form-group">
                <label class="form-label" for="newPassword">Mật khẩu mới</label>
                <div class="password-input-group">
                    <input type="password" id="newPassword" name="newPassword" class="form-control"
                        placeholder="Nhập mật khẩu mới" required minlength="8" autocomplete="new-password">
                    <button type="button" class="toggle-password-btn" onclick="togglePassword('newPassword')"
                        title="Hiện/ẩn mật khẩu">👁</button>
                </div>
            </div>

            <!-- Confirm Password -->
            <div class="form-group">
                <label class="form-label" for="confirmPassword">Nhập lại mật khẩu mới</label>
                <div class="password-input-group">
                    <input type="password" id="confirmPassword" name="confirmPassword" class="form-control"
                        placeholder="Xác nhận mật khẩu mới" required minlength="8" autocomplete="new-password">
                    <button type="button" class="toggle-password-btn" onclick="togglePassword('confirmPassword')"
                        title="Hiện/ẩn mật khẩu">👁</button>
                </div>
            </div>

            <div class="form-group" style="margin-bottom: 0;">
                <button type="submit" class="btn btn-primary forgot-submit-btn">
                    Lưu mật khẩu
                </button>
            </div>

        </form>

    </div>

    <script>
        function togglePassword(fieldId) {
            const field = document.getElementById(fieldId);
            field.type = field.type === 'password' ? 'text' : 'password';
        }
    </script>
</body>

</html>

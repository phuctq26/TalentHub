<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu — TalentHub</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="forgot-password-body">

    <div class="forgot-card">

        <!-- Logo Area -->
        <div class="forgot-logo-area">
            <span class="logo">TalentHub</span>
        </div>

        <!-- Title & Subtitle -->
        <h2 class="forgot-title">Quên mật khẩu?</h2>
        <p class="forgot-desc">
            Điền email gắn với tài khoản của bạn để nhận đường dẫn thay đổi mật khẩu
        </p>

        <!-- Success/Error Alerts (Nếu có) -->
        <div th:if="${successMessage}" class="alert alert-success" role="alert">
            <span th:text="${successMessage}"></span>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger" role="alert">
            <span th:text="${errorMessage}"></span>
        </div>

        <!-- Form -->
        <form th:action="@{/forgot-password}" method="post" th:unless="${successMessage}">

            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input type="email"
                       id="email"
                       name="email"
                       class="form-control"
                       placeholder="Nhập email của bạn"
                       required
                       autocomplete="email"
                       th:value="${email}">
            </div>

            <div class="form-group" style="margin-bottom: 0;">
                <button type="submit" class="btn btn-primary forgot-submit-btn">
                    Tiếp tục
                </button>
            </div>

        </form>

        <!-- Back to login link -->
        <a th:href="@{/login}" class="forgot-back-link">
            Quay lại đăng nhập
        </a>

    </div>

</body>

</html>

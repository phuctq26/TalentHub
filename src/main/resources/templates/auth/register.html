<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create your account - TalentHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .register-container {
            max-width: 500px;
            margin: 50px auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="register-container">
        <h1 class="text-center mb-4">Create your account</h1>

        <div th:if="${errorMessage}" class="alert alert-danger" role="alert" th:text="${errorMessage}">
        </div>

        <form th:action="@{/register}" th:object="${userRegisterDto}" method="post" id="registerForm">
            
            <div class="mb-3">
                <label for="fullName" class="form-label">Full name</label>
                <input type="text" id="fullName" name="fullName" class="form-control" th:field="*{fullName}" 
                       th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid' : ''" required>
                <div class="invalid-feedback alert alert-danger p-2 mt-1" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
            </div>

            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" id="username" name="username" class="form-control" th:field="*{username}" 
                       th:classappend="${#fields.hasErrors('username')} ? 'is-invalid' : ''" required>
                <div class="form-text text-muted">4-50 characters. Letters, digits, and underscores only.</div>
                <div class="invalid-feedback alert alert-danger p-2 mt-1" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">Email address</label>
                <input type="email" id="email" name="email" class="form-control" th:field="*{email}" 
                       th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''" required>
                <div class="invalid-feedback alert alert-danger p-2 mt-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" name="password" class="form-control" th:field="*{password}" 
                       th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''" required>
                <div class="form-text text-muted">At least 8 characters, including 1 uppercase letter and 1 number</div>
                <div class="invalid-feedback alert alert-danger p-2 mt-1" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
            </div>

            <div class="mb-3">
                <label for="confirmPassword" class="form-label">Confirm password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" class="form-control" th:field="*{confirmPassword}" 
                       th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid' : ''" required>
                <div class="invalid-feedback alert alert-danger p-2 mt-1" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
            </div>

            <button type="submit" id="submitBtn" class="btn btn-primary w-100" disabled>Create Account</button>
            
            <div class="mt-3 text-center">
                <a th:href="@{/login}" class="text-decoration-none">Already have an account?</a>
            </div>
        </form>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const form = document.getElementById('registerForm');
        const submitBtn = document.getElementById('submitBtn');
        const inputs = form.querySelectorAll('input[required]');

        function checkForm() {
            let allFilled = true;
            inputs.forEach(input => {
                if (input.value.trim() === '') {
                    allFilled = false;
                }
            });
            submitBtn.disabled = !allFilled;
        }

        inputs.forEach(input => {
            input.addEventListener('input', checkForm);
        });

        // Initial check in case of form reload with values
        checkForm();
    });
</script>

</body>
</html>

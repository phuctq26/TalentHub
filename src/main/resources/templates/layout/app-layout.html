<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content, title, activeTab)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' - TalentHub'">TalentHub</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom Style for Sidebar & Header -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-shell">
    
    <!-- Sidebar fragment, truyền activeTab vào -->
    <div th:replace="~{fragments/sidebar :: sidebar(${activeTab})}"></div>

    <!-- Main area -->
    <div class="app-main">
        
        <!-- Header fragment, truyền title làm pageTitle -->
        <header th:replace="~{fragments/header :: header(${title})}"></header>

        <!-- Container wrapper cho nội dung trang -->
        <div class="app-main-inner">
            <div th:replace="${content}"></div>
        </div>
        
    </div>
    
</div>

<!-- Bootstrap Bundle JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- HTMX Library -->
<script src="https://unpkg.com/htmx.org@2.0.1"></script>
</body>
</html>

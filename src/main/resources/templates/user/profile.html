<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile - TalentHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .profile-container {
            max-width: 600px;
            margin: 50px auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="profile-container">
        <h1 class="mb-4 text-center">User Profile</h1>

        <div class="mb-3">
            <label class="form-label">Full name</label>
            <input type="text" class="form-control" th:value="${user.fullName}" readonly>
        </div>

        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" class="form-control" th:value="${user.username}" readonly>
            <div class="form-text text-muted">This cannot be changed.</div>
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" th:value="${user.email}" readonly>
        </div>

        <div class="mb-4">
            <label class="form-label d-block">Role</label>
            <span class="badge bg-danger fs-6" th:if="${user.role.name == 'ADMIN'}">Admin</span>
            <span class="badge bg-success fs-6" th:if="${user.role.name == 'HR_MANAGER'}">HR Manager</span>
            <span class="badge bg-info text-dark fs-6" th:if="${user.role.name == 'INTERVIEWER'}">Interviewer</span>
            <span class="badge bg-primary fs-6" th:if="${user.role.name == 'CANDIDATE'}">Candidate</span>
        </div>

        <div class="d-flex gap-3 mt-4">
            <a th:href="@{/change-password}" class="btn btn-secondary flex-grow-1">Change Password</a>
            <a th:href="@{/logout}" class="btn btn-danger flex-grow-1">Sign Out</a>
        </div>
    </div>
</div>

</body>
</html>

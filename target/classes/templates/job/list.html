<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách tin tuyển dụng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Danh sách tin tuyển dụng</h2>
        <a th:href="@{/jobs/manage/new}" class="btn btn-primary">Tạo tin mới</a>
    </div>

    <form th:action="@{/jobs/manage}" method="get" class="row g-2 mb-4">
        <div class="col-md-4">
            <input type="text"
                   name="keyword"
                   class="form-control"
                   placeholder="Tìm theo tiêu đề"
                   th:value="${keyword}">
        </div>

        <div class="col-md-3">
            <select name="status" class="form-select">
                <option value="">Tất cả trạng thái</option>
                <option th:each="s : ${statuses}"
                        th:value="${s}"
                        th:text="${s}"
                        th:selected="${s == status}">
                </option>
            </select>
        </div>

        <div class="col-md-3">
            <input type="text"
                   name="department"
                   class="form-control"
                   placeholder="Phòng ban"
                   th:value="${department}">
        </div>

        <div class="col-md-2 d-flex gap-2">
            <button type="submit" class="btn btn-success">Lọc</button>
            <a th:href="@{/jobs/manage}" class="btn btn-secondary">Làm mới</a>
        </div>
    </form>

    <div th:if="${#lists.isEmpty(jobs)}" class="alert alert-warning">
        Không có tin tuyển dụng nào phù hợp.
    </div>

    <div class="row" th:if="${!#lists.isEmpty(jobs)}">
        <div class="col-md-6 mb-3" th:each="job : ${jobs}">
            <div class="card h-100">
                <div class="card-body">

                    <h5>
                        <a th:href="@{/jobs/manage/{id}(id=${job.id})}"
                           th:text="${job.title}">
                            Tiêu đề
                        </a>
                    </h5>

                    <p class="mb-1">
                        <strong>Phòng ban:</strong>
                        <span th:text="${job.department}"></span>
                    </p>

                    <p class="mb-1">
                        <strong>Địa điểm:</strong>
                        <span th:text="${job.location}"></span>
                    </p>

                    <p class="mb-1">
                        <strong>Trạng thái:</strong>
                        <span class="badge"
                              th:classappend="${job.status.name() == 'DRAFT'} ? ' bg-secondary' :
                                              (${job.status.name() == 'ACTIVE'} ? ' bg-success' : ' bg-danger')"
                              th:text="${job.status}">
                        </span>
                    </p>

                    <p class="mb-1">
                        <strong>Hạn nộp:</strong>
                        <span th:text="${job.applicationDeadline != null ? job.applicationDeadline : 'Chưa có'}"></span>
                    </p>

                    <div class="mt-3 d-flex gap-2 flex-wrap">

                        <a th:if="${job.status.name() == 'DRAFT' || job.status.name() == 'ACTIVE'}"
                           th:href="@{/jobs/manage/{id}/edit(id=${job.id})}"
                           class="btn btn-sm btn-warning">
                            Sửa
                        </a>

                        <form th:if="${job.status.name() == 'DRAFT'}"
                              th:action="@{/jobs/manage/{id}/publish(id=${job.id})}"
                              method="post">
                            <button type="submit" class="btn btn-sm btn-primary">
                                Đăng tin
                            </button>
                        </form>

                        <form th:if="${job.status.name() == 'ACTIVE'}"
                              th:action="@{/jobs/manage/{id}/close(id=${job.id})}"
                              method="post">
                            <button type="submit" class="btn btn-sm btn-secondary">
                                Đóng tin
                            </button>
                        </form>

                        <form th:if="${job.status.name() == 'DRAFT'}"
                              th:action="@{/jobs/manage/{id}/delete(id=${job.id})}"
                              method="post"
                              onsubmit="return confirm('Bạn có chắc muốn xóa tin này không?')">
                            <button type="submit" class="btn btn-sm btn-danger">
                                Xóa
                            </button>
                        </form>

                    </div>

                </div>
            </div>
        </div>
    </div>

</div>

</body>
</html>

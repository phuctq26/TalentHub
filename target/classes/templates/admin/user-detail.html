<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết người dùng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4" style="max-width: 600px;">

    <div class="card shadow">
        <div class="card-header bg-dark text-white text-center">
            <h4 class="mb-0">CHI TIẾT NGƯỜI DÙNG</h4>
        </div>
        <div class="card-body">
            <table class="table table-bordered align-middle">
                <tr>
                    <th class="table-light" style="width: 35%;">ID</th>
                    <td th:text="${user.id}">1</td>
                </tr>
                <tr>
                    <th class="table-light">Họ và tên</th>
                    <td th:text="${user.fullName}" class="fw-bold">Nguyễn Văn A</td>
                </tr>
                <tr>
                    <th class="table-light">Tên đăng nhập</th>
                    <td th:text="${user.username}">nguyenvana</td>
                </tr>
                <tr>
                    <th class="table-light">Email</th>
                    <td th:text="${user.email}">a@example.com</td>
                </tr>
                <tr>
                    <th class="table-light">Số điện thoại</th>
                    <td th:text="${user.phone != null && user.phone != '' ? user.phone : 'Chưa cập nhật'}">-</td>
                </tr>
                <tr>
                    <th class="table-light">Vai trò</th>
                    <td>
                        <span class="badge bg-info text-dark" th:text="${user.role != null ? user.role.name : 'Chưa gán'}">ADMIN</span>
                    </td>
                </tr>
                <tr>
                    <th class="table-light">Trạng thái</th>
                    <td>
                        <span class="badge"
                              th:classappend="${user.status.name() == 'ACTIVE'} ? 'bg-success' : (${user.status.name() == 'LOCKED'} ? 'bg-warning text-dark' : 'bg-danger')"
                              th:text="${user.status}">ACTIVE</span>
                    </td>
                </tr>
                <tr>
                    <th class="table-light">Ngày tạo</th>
                    <td th:text="${user.createdAt}">-</td>
                </tr>
                <tr>
                    <th class="table-light">Lần cập nhật cuối</th>
                    <td th:text="${user.updatedAt}">-</td>
                </tr>
                <tr>
                    <th class="table-light">Số lần đăng nhập lỗi</th>
                    <td th:text="${user.failedLoginAttempts}">0</td>
                </tr>
                <tr>
                    <th class="table-light">Khóa đến khi</th>
                    <td th:text="${user.lockedUntil != null ? user.lockedUntil : 'Không bị khóa'}">-</td>
                </tr>
                <tr>
                    <th class="table-light">Đăng nhập lần cuối lúc</th>
                    <td th:text="${user.lastLoginAt != null ? user.lastLoginAt : 'Chưa bao giờ đăng nhập'}">-</td>
                </tr>
            </table>

            <div class="d-flex gap-2 justify-content-end mt-4">
                <a th:href="@{/admin/users}" class="btn btn-secondary">Quay lại danh sách</a>
                <a th:href="@{/admin/users/{id}/edit(id=${user.id})}" class="btn btn-warning">Chỉnh sửa</a>
            </div>
        </div>
    </div>

</div>

</body>
</html>
